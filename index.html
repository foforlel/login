<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
</head>
<body>
    <form action="login.php" method="POST" onsubmit="return validarFormulario()">
        <h2>Iniciar Sesión</h2>
        
        <label for="rut">RUT:</label>
        <!-- El evento oninput va formateando el RUT automáticamente mientras escriben -->
        <input type="text" id="rut" name="rut" placeholder="12.345.678-9" required oninput="formatearRUT(this)">
        
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        
        <button type="submit">Ingresar</button>
        <p id="error-msg" style="color: red;"></p>
    </form>

    <script src="valida_rut.js"></script>
</body>
</html>
